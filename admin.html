<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIXTON · Панель управления</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#15252A;--card:#1B3036;--accent:#D94220;--gold:#C8943A;--green:#19A668;
    --txt:#EAF2F1;--txt3:#7E9AA0;--brd:#2A454C;}
  *{box-sizing:border-box}
  body{margin:0;background:#0E191D;color:var(--txt);font-family:Mulish,sans-serif;padding:22px;max-width:820px;margin:0 auto}
  h1{font-family:'Bebas Neue';letter-spacing:1px;font-weight:400;font-size:38px;margin:0 0 2px}
  .sub{color:var(--txt3);font-size:13px;margin-bottom:18px}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{background:var(--card);border:1px solid var(--brd);color:var(--txt);padding:10px 20px;border-radius:10px;
    font-family:Mulish;font-weight:800;font-size:14px;cursor:pointer}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .page{display:none}
  .page.show{display:block}
  .status{font-size:13px;color:var(--gold);margin-bottom:16px;min-height:18px}
  .branch{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:18px;margin-bottom:16px}
  .branch h3{font-family:'Bebas Neue';font-weight:400;font-size:26px;letter-spacing:1px;margin:0 0 4px;color:var(--gold)}
  .branch .cap{color:var(--txt3);font-size:12px;margin-bottom:14px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .chip{display:flex;align-items:center;gap:8px;background:#0E191D;border:1px solid var(--brd);
    border-radius:10px;padding:8px 12px;font-size:14px;font-weight:700}
  .chip button{background:none;border:none;color:var(--accent);font-size:16px;cursor:pointer;line-height:1;padding:0}
  .addrow{display:flex;gap:8px}
  .addrow input{flex:1;background:#0E191D;border:1px solid var(--brd);color:var(--txt);
    padding:10px 12px;border-radius:10px;font-family:Mulish;font-size:14px}
  .addrow button{background:var(--brd);border:none;color:#fff;padding:10px 16px;border-radius:10px;
    font-family:Mulish;font-weight:800;font-size:14px;cursor:pointer}
  .empty{color:var(--txt3);font-size:13px}
  .savebar{position:sticky;bottom:0;padding:14px 0;background:linear-gradient(transparent,#0E191D 40%)}
  .save{width:100%;background:var(--green);border:none;color:#fff;padding:14px;border-radius:12px;
    font-family:Mulish;font-weight:900;font-size:15px;cursor:pointer}
  .save:disabled{opacity:.5;cursor:default}
  .soon{color:var(--txt3);font-size:14px;padding:20px;background:var(--card);border:1px solid var(--brd);border-radius:14px}
  .tform{display:flex;flex-direction:column;gap:12px}
  .frow{display:flex;flex-direction:column;gap:5px}
  .frow label{font-size:12px;color:var(--txt3);font-weight:800;text-transform:uppercase;letter-spacing:.5px}
  .frow select,.frow input[type=text],.frow input[type=time],.frow input[type=number]{background:#0E191D;border:1px solid var(--brd);color:var(--txt);
    padding:11px 12px;border-radius:10px;font-family:Mulish;font-size:14px}
  .days{display:flex;flex-wrap:wrap;gap:6px}
  .dayb{background:#0E191D;border:1px solid var(--brd);color:var(--txt);padding:8px 12px;border-radius:9px;
    font-family:Mulish;font-weight:800;font-size:13px;cursor:pointer;user-select:none}
  .dayb.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .dayb.every{border-color:var(--gold);color:var(--gold)}
  .dayb.every.on{background:var(--gold);border-color:var(--gold);color:#0E191D}
  .addtask{background:var(--brd);border:none;color:#fff;padding:12px;border-radius:10px;font-family:Mulish;font-weight:800;font-size:14px;cursor:pointer;margin-top:4px}
  .tcard{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .tcard.off{opacity:.5}
  .tcard .tmain{flex:1;min-width:0}
  .tcard .ttime{font-family:'Bebas Neue';font-size:26px;color:var(--gold);line-height:1}
  .tcard .ttext{font-size:14px;font-weight:700;margin:2px 0}
  .tcard .tmeta{font-size:12px;color:var(--txt3)}
  .tcard .tacts{display:flex;gap:6px}
  .tcard .tacts button{background:#0E191D;border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer}
  .tcard .tacts .del{color:var(--accent)}
</style>
</head>
<body>
<h1>⚙️ BRIXTON · Панель управления</h1>
<div class="sub">Настройка админов и задач. Изменения сохраняются в облако.</div>

<div class="tabs">
  <button class="tab active" id="tabAdminsBtn" onclick="showPage('admins')">👤 Админы</button>
  <button class="tab" id="tabTasksBtn" onclick="showPage('tasks')">✅ Задачи</button>
  <button class="tab" id="tabGoalsBtn" onclick="showPage('goals')">🎯 Цели</button>
</div>

<div class="status" id="status">Загрузка…</div>

<div class="page show" id="page_admins">
  <div id="branches"></div>
  <div class="savebar">
    <button class="save" id="saveBtn" onclick="saveAdmins(this)" disabled>💾 Сохранить админов</button>
  </div>
</div>

<div class="page" id="page_tasks">
  <div class="branch">
    <h3>Новая задача</h3>
    <div class="cap">Заполни поля и нажми «Добавить в список»</div>
    <div class="tform">
      <div class="frow">
        <label>Филиал</label>
        <select id="tBranch">
          <option value="694866">Менделеева</option>
          <option value="1076318">Энтузиастов</option>
          <option value="both">Оба филиала</option>
        </select>
      </div>
      <div class="frow">
        <label>Время</label>
        <input type="time" id="tTime" value="11:00">
      </div>
      <div class="frow">
        <label>Текст задачи</label>
        <input type="text" id="tText" placeholder="Напр.: Проверить чистоту зоны ожидания">
      </div>
      <div class="frow">
        <label>Расписание</label>
        <div class="days" id="tSchedType"></div>
      </div>
      <div class="frow" id="rowWeek">
        <label>Дни недели</label>
        <div class="days" id="tDays"></div>
      </div>
      <div class="frow" id="rowMonth" style="display:none">
        <label>Числа месяца</label>
        <div class="days" id="tDates"></div>
      </div>
      <button class="addtask" id="addTaskBtn" onclick="addTask()">➕ Добавить в список</button>
    </div>
  </div>

  <div id="taskList"></div>

  <div class="savebar">
    <button class="save" id="saveTasksBtn" onclick="saveTasks(this)" disabled>💾 Сохранить задачи</button>
  </div>
</div>

<div class="page" id="page_goals">
  <div class="branch">
    <h3>Цель месяца по клиентам</h3>
    <div class="cap">Укажи цель по каждому филиалу. Используется в вечернем отчёте мастеров.</div>
    <div class="tform">
      <div class="frow">
        <label>Менделеева — цель клиентов в месяц</label>
        <input type="number" id="goal694866" placeholder="450" min="1">
      </div>
      <div class="frow">
        <label>Энтузиастов — цель клиентов в месяц</label>
        <input type="number" id="goal1076318" placeholder="450" min="1">
      </div>
    </div>
  </div>
  <div class="savebar">
    <button class="save" id="saveGoalsBtn" onclick="saveGoals(this)" disabled>💾 Сохранить цели</button>
  </div>
</div>

<script>
const SUPA_URL='https://ojzjwnxerbxnogahpfuz.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qemp3bnhlcmJ4bm9nYWhwZnV6Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTA3Mzc2MSwiZXhwIjoyMDk2NjQ5NzYxfQ.bQPZZCMZmc_S3yqq41DDpv1o8p2wO-8G6QN7VJ_BcBc';
const BASE=SUPA_URL+'/rest/v1/brixton_store';
const H={apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

const BRANCHES=[{id:'694866',name:'Менделеева'},{id:'1076318',name:'Энтузиастов'}];
let admins={};   // { '694866':[...], '1076318':[...] }
let tasks=[];    // [{id,branch,time,text,days:[...],active}]
let goals={};    // { '694866':450, '1076318':450 }
const DAYS=['пн','вт','ср','чт','пт','сб','вс'];
const BRNAME={'694866':'Менделеева','1076318':'Энтузиастов','both':'Оба филиала'};
let selDays=DAYS.slice(); // выбранные дни недели
let schedType='week';     // 'week' | 'month'
let editingId=null;       // id редактируемой задачи (или null = новая)
let selDates=[];          // выбранные числа месяца: 1..31 и/или 'last'

function setStatus(t,color){var s=document.getElementById('status');s.textContent=t;s.style.color=color||'var(--gold)';}
function showPage(p){
  document.getElementById('page_admins').classList.toggle('show',p==='admins');
  document.getElementById('page_tasks').classList.toggle('show',p==='tasks');
  document.getElementById('page_goals').classList.toggle('show',p==='goals');
  document.getElementById('tabAdminsBtn').classList.toggle('active',p==='admins');
  document.getElementById('tabTasksBtn').classList.toggle('active',p==='tasks');
  document.getElementById('tabGoalsBtn').classList.toggle('active',p==='goals');
}

async function load(){
  setStatus('Загрузка…');
  try{
    const r=await fetch(BASE+'?id=eq.main&select=data',{headers:H});
    const rows=await r.json();
    const data=rows&&rows[0]&&rows[0].data?rows[0].data:{};
    admins=data.admins||{};
    BRANCHES.forEach(b=>{if(!Array.isArray(admins[b.id]))admins[b.id]=[];});
    tasks=Array.isArray(data.tasks)?data.tasks:[];
    goals=data.goals||{'694866':450,'1076318':450};
    document.getElementById('goal694866').value=goals['694866']||450;
    document.getElementById('goal1076318').value=goals['1076318']||450;
    document.getElementById('saveGoalsBtn').disabled=false;
    renderBranches();
    renderSchedType();
    renderDayPicker();
    renderDatePicker();
    renderTasks();
    setStatus('Загружено. Настрой админов/задачи и сохрани.');
    document.getElementById('saveBtn').disabled=false;
    document.getElementById('saveTasksBtn').disabled=false;
  }catch(e){setStatus('Ошибка загрузки: '+e.message,'#E8846B');}
}

function renderSchedType(){
  const box=document.getElementById('tSchedType');box.innerHTML='';
  [['week','По дням недели'],['month','По числам месяца']].forEach(o=>{
    const b=document.createElement('span');b.className='dayb'+(schedType===o[0]?' on':'');
    b.textContent=o[1];
    b.onclick=()=>{schedType=o[0];
      document.getElementById('rowWeek').style.display=(schedType==='week')?'flex':'none';
      document.getElementById('rowMonth').style.display=(schedType==='month')?'flex':'none';
      renderSchedType();};
    box.appendChild(b);
  });
}

function renderDatePicker(){
  const box=document.getElementById('tDates');box.innerHTML='';
  const last=document.createElement('span');last.className='dayb every'+(selDates.includes('last')?' on':'');
  last.textContent='последний день';
  last.onclick=()=>{if(selDates.includes('last'))selDates=selDates.filter(x=>x!=='last');else selDates.push('last');renderDatePicker();};
  box.appendChild(last);
  for(let n=1;n<=31;n++){
    const b=document.createElement('span');b.className='dayb'+(selDates.includes(n)?' on':'');
    b.textContent=n;
    b.onclick=()=>{if(selDates.includes(n))selDates=selDates.filter(x=>x!==n);else selDates.push(n);renderDatePicker();};
    box.appendChild(b);
  }
}

function renderDayPicker(){
  const box=document.getElementById('tDays');box.innerHTML='';
  const every=document.createElement('span');every.className='dayb every'+(selDays.length===7?' on':'');
  every.textContent='каждый день';
  every.onclick=()=>{selDays=selDays.length===7?[]:DAYS.slice();renderDayPicker();};
  box.appendChild(every);
  DAYS.forEach(d=>{
    const b=document.createElement('span');b.className='dayb'+(selDays.includes(d)?' on':'');
    b.textContent=d;
    b.onclick=()=>{if(selDays.includes(d))selDays=selDays.filter(x=>x!==d);else selDays.push(d);renderDayPicker();};
    box.appendChild(b);
  });
}

function resetForm(){
  editingId=null;
  document.getElementById('tText').value='';
  document.getElementById('addTaskBtn').textContent='➕ Добавить в список';
}

function editTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editingId=id;
  document.getElementById('tBranch').value=t.branch;
  document.getElementById('tTime').value=t.time;
  document.getElementById('tText').value=t.text;
  schedType=t.sched||'week';
  document.getElementById('rowWeek').style.display=(schedType==='week')?'flex':'none';
  document.getElementById('rowMonth').style.display=(schedType==='month')?'flex':'none';
  selDays=(t.days||DAYS.slice()).slice();
  selDates=(t.dates||[]).slice();
  renderSchedType();renderDayPicker();renderDatePicker();
  document.getElementById('addTaskBtn').textContent='💾 Обновить задачу';
  setStatus('Редактируешь задачу. Измени поля и нажми «Обновить задачу».','#C8943A');
  window.scrollTo({top:0,behavior:'smooth'});
}

function addTask(){
  const branch=document.getElementById('tBranch').value;
  const time=document.getElementById('tTime').value;
  const text=document.getElementById('tText').value.trim();
  if(!time){setStatus('Укажи время задачи.','#E8846B');return;}
  if(!text){setStatus('Впиши текст задачи.','#E8846B');return;}
  const task={branch:branch,time:time,text:text,active:true,sched:schedType};
  if(schedType==='week'){
    if(!selDays.length){setStatus('Выбери хотя бы один день недели.','#E8846B');return;}
    task.days=DAYS.filter(d=>selDays.includes(d));
  } else {
    if(!selDates.length){setStatus('Выбери хотя бы одно число месяца.','#E8846B');return;}
    const nums=selDates.filter(x=>x!=='last').sort((a,b)=>a-b);
    if(selDates.includes('last'))nums.push('last');
    task.dates=nums;
  }
  if(editingId){
    const i=tasks.findIndex(x=>x.id===editingId);
    if(i!==-1){task.id=editingId;task.active=tasks[i].active;tasks[i]=task;}
    resetForm();
    setStatus('Задача обновлена. Не забудь «Сохранить задачи».','#7BD0A8');
  } else {
    task.id='t'+Date.now();
    tasks.push(task);
    document.getElementById('tText').value='';
    setStatus('Задача добавлена в список. Не забудь «Сохранить задачи».','#7BD0A8');
  }
  renderTasks();
}

function renderTasks(){
  const box=document.getElementById('taskList');box.innerHTML='';
  if(!tasks.length){box.innerHTML='<div class="empty">Задач пока нет.</div>';return;}
  const sorted=tasks.slice().sort((a,b)=>(a.time>b.time?1:a.time<b.time?-1:0));
  sorted.forEach(t=>{
    const idx=tasks.indexOf(t);
    const card=document.createElement('div');card.className='tcard'+(t.active?'':' off');
    const daysTxt=(t.sched==='month')
      ? ('числа: '+(t.dates||[]).map(x=>x==='last'?'послед.':x).join(', '))
      : ((t.days&&t.days.length===7)?'каждый день':(t.days||[]).join(', '));
    const main=document.createElement('div');main.className='tmain';
    main.innerHTML='<div class="ttime">'+t.time+'</div><div class="ttext">'+t.text+'</div>'+
      '<div class="tmeta">'+BRNAME[t.branch]+' · '+daysTxt+(t.active?'':' · выключена')+'</div>';
    const acts=document.createElement('div');acts.className='tacts';
    const ed=document.createElement('button');ed.textContent='✏️';ed.title='редактировать';
    ed.onclick=()=>editTask(t.id);
    const tg=document.createElement('button');tg.textContent=t.active?'⏸':'▶';tg.title='вкл/выкл';
    tg.onclick=()=>{tasks[idx].active=!tasks[idx].active;renderTasks();};
    const del=document.createElement('button');del.className='del';del.textContent='✕';del.title='удалить';
    del.onclick=()=>{if(confirm('Удалить задачу?')){if(editingId===t.id)resetForm();tasks.splice(idx,1);renderTasks();}};
    acts.appendChild(ed);acts.appendChild(tg);acts.appendChild(del);
    card.appendChild(main);card.appendChild(acts);
    box.appendChild(card);
  });
}

async function saveTasks(btn){
  const old=btn.textContent;btn.disabled=true;btn.textContent='Сохраняю…';
  try{
    const r=await fetch(BASE+'?id=eq.main&select=data',{headers:H});
    const rows=await r.json();
    const data=(rows&&rows[0]&&rows[0].data)?rows[0].data:{};
    data.tasks=tasks;
    const p=await fetch(BASE+'?id=eq.main',{method:'PATCH',headers:Object.assign({},H,{Prefer:'return=minimal'}),body:JSON.stringify({data:data})});
    if(p.ok){setStatus('✓ Задачи сохранены в облако.','#7BD0A8');}
    else{setStatus('Ошибка сохранения задач: HTTP '+p.status,'#E8846B');}
  }catch(e){setStatus('Ошибка сохранения задач: '+e.message,'#E8846B');}
  finally{btn.disabled=false;btn.textContent=old;}
}

function renderBranches(){
  const box=document.getElementById('branches');box.innerHTML='';
  BRANCHES.forEach(b=>{
    const div=document.createElement('div');div.className='branch';
    div.innerHTML='<h3>'+b.name+'</h3><div class="cap">Админы этого филиала — из них строятся кнопки «кто на смене»</div>';
    const chips=document.createElement('div');chips.className='chips';
    if(!admins[b.id].length){chips.innerHTML='<span class="empty">Пока никого. Добавь ниже.</span>';}
    admins[b.id].forEach((name,i)=>{
      const c=document.createElement('span');c.className='chip';
      c.innerHTML=name+' ';
      const x=document.createElement('button');x.textContent='✕';
      x.onclick=()=>{admins[b.id].splice(i,1);renderBranches();};
      c.appendChild(x);chips.appendChild(c);
    });
    div.appendChild(chips);
    const row=document.createElement('div');row.className='addrow';
    const inp=document.createElement('input');inp.placeholder='Имя админа';
    const add=()=>{const v=inp.value.trim();if(!v)return;
      if(admins[b.id].some(n=>n.toLowerCase()===v.toLowerCase())){inp.value='';return;}
      admins[b.id].push(v);renderBranches();};
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')add();});
    const btn=document.createElement('button');btn.textContent='Добавить';btn.onclick=add;
    row.appendChild(inp);row.appendChild(btn);div.appendChild(row);
    box.appendChild(div);
  });
}

async function saveAdmins(btn){
  const old=btn.textContent;btn.disabled=true;btn.textContent='Сохраняю…';
  try{
    // прочитать свежий data (чтобы не затереть freeSlots и др.)
    const r=await fetch(BASE+'?id=eq.main&select=data',{headers:H});
    const rows=await r.json();
    const data=(rows&&rows[0]&&rows[0].data)?rows[0].data:{};
    data.admins=admins;
    const p=await fetch(BASE+'?id=eq.main',{method:'PATCH',headers:Object.assign({},H,{Prefer:'return=minimal'}),body:JSON.stringify({data:data})});
    if(p.ok){setStatus('✓ Админы сохранены в облако.','#7BD0A8');}
    else{setStatus('Ошибка сохранения: HTTP '+p.status,'#E8846B');}
  }catch(e){setStatus('Ошибка сохранения: '+e.message,'#E8846B');}
  finally{btn.disabled=false;btn.textContent=old;}
}

load();

async function saveGoals(btn){
  const old=btn.textContent;btn.disabled=true;btn.textContent='Сохраняю…';
  goals['694866']=parseInt(document.getElementById('goal694866').value)||450;
  goals['1076318']=parseInt(document.getElementById('goal1076318').value)||450;
  try{
    const r=await fetch(BASE+'?id=eq.main&select=data',{headers:H});
    const rows=await r.json();
    const data=(rows&&rows[0]&&rows[0].data)?rows[0].data:{};
    data.goals=goals;
    const p=await fetch(BASE+'?id=eq.main',{method:'PATCH',headers:Object.assign({},H,{Prefer:'return=minimal'}),body:JSON.stringify({data:data})});
    if(p.ok){setStatus('✓ Цели сохранены в облако.','#7BD0A8');}
    else{setStatus('Ошибка сохранения целей: HTTP '+p.status,'#E8846B');}
  }catch(e){setStatus('Ошибка: '+e.message,'#E8846B');}
  finally{btn.disabled=false;btn.textContent=old;}
}
</script>
</body>
</html>
