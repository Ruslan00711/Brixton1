:root{--bg:#15252A;--card:#1B3036;--accent:#D94220;--gold:#C8943A;--green:#19A668;--blue:#2878CC;--txt:#EAF2F1;--txt3:#7E9AA0;--brd:#2A454C;}
*{box-sizing:border-box}
body{margin:0;background:#0E191D;color:var(--txt);font-family:'VinSans',sans-serif;padding:24px}
h1{font-family:'Marvin';letter-spacing:1px;font-weight:400;font-size:36px;margin:0 0 4px}
.sub{color:var(--txt3);font-size:14px;margin-bottom:18px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.dbtn{background:var(--card);border:1px solid var(--brd);color:var(--txt);padding:9px 20px;border-radius:9px;font-family:'VinSans';font-weight:800;font-size:14px;cursor:pointer;transition:.15s}
.dbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.footinput{background:var(--card);border:1px solid var(--brd);color:var(--txt);padding:9px 12px;border-radius:9px;font-family:'VinSans';font-size:13px;min-width:300px}
.status{margin:6px 0 20px;font-size:14px;color:var(--gold)}
.grid{display:flex;gap:34px;flex-wrap:wrap;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:12px;width:302px}
.previewBox{width:302px;height:537px;overflow:hidden;border-radius:16px;border:1px solid var(--brd);background:#000}
.scaler{transform:scale(0.2796);transform-origin:top left}
.panel{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px}
.panel .ttl{font-family:'VinSans';font-weight:800;font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.mrow{border-top:1px solid var(--brd);padding:9px 0}
.mrow:first-of-type{border-top:none}
.mhead{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;cursor:pointer}
.mhead input{width:16px;height:16px;accent-color:var(--accent)}
.mhead .cnt{margin-left:auto;color:var(--txt3);font-size:12px;font-weight:600}
.slots{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 2px 24px}
.slotbtn{font-family:'VinSans';font-weight:700;font-size:12px;padding:5px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--txt);transition:.12s;user-select:none}
.slotbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.slotbtn.off{opacity:.4;text-decoration:line-through}
.urlbox{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px}
.urlbox label{display:block;font-size:11px;color:var(--txt3);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.urlbox input{width:100%;background:#0E191D;border:1px solid var(--brd);color:var(--txt);padding:8px 10px;border-radius:8px;font-family:'VinSans';font-size:12px}
.rowbtns{display:flex;gap:8px}
.qbtn{flex:none;background:var(--card);border:1px solid var(--brd);color:var(--txt);padding:12px 14px;border-radius:11px;font-family:'VinSans';font-weight:800;font-size:14px;cursor:pointer}
.dl{flex:1;background:var(--green);border:none;color:#fff;padding:12px;border-radius:11px;font-family:'VinSans';font-weight:900;font-size:14px;cursor:pointer}
.dl:disabled{opacity:.4;cursor:default}
.empty{color:var(--txt3);font-size:13px;padding:14px 0}

/* ===== STORY 1080x1920 ===== */
.story{width:1080px;height:1920px;position:relative;overflow:hidden;padding:96px 76px 80px;display:flex;flex-direction:column;font-family:'VinSans';color:var(--txt);
  background:radial-gradient(75% 45% at 50% -2%,rgba(217,66,32,.28),transparent 60%),radial-gradient(85% 55% at 108% 106%,rgba(200,148,58,.20),transparent 55%),radial-gradient(60% 40% at -10% 40%,rgba(40,120,204,.10),transparent 60%),linear-gradient(158deg,#21404A 0%,#16272C 46%,#0E1B1F 100%);}
.story .tex{position:absolute;inset:0;pointer-events:none;opacity:.5;background:repeating-linear-gradient(135deg,rgba(255,255,255,.020) 0 2px,transparent 2px 26px);}
.story .vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(120% 90% at 50% 40%,transparent 55%,rgba(0,0,0,.45) 100%);}
.story .frame{position:absolute;inset:34px;border:2px solid rgba(200,148,58,.34);border-radius:34px;pointer-events:none}
.story .frame:after{content:"";position:absolute;inset:10px;border:1px solid rgba(255,255,255,.05);border-radius:26px}
.story>*{position:relative;z-index:2}
.s-topline{display:flex;align-items:baseline;justify-content:space-between}
.s-brand{font-family:'Marvin';font-size:58px;letter-spacing:6px;color:#fff;line-height:1}
.s-brand b{color:var(--accent);font-weight:400}
.s-place{font-family:'VinSans';font-size:24px;font-weight:800;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.s-title{font-family:'Marvin';font-size:104px;line-height:.9;letter-spacing:1px;color:#fff;margin:40px 0 26px}
.s-title span{color:var(--accent)}
.s-daywrap{display:flex;align-items:center;gap:26px}
.s-daybadge{font-family:'Marvin';font-size:96px;line-height:.9;color:#fff;background:var(--accent);padding:20px 46px 14px;border-radius:22px;letter-spacing:3px;box-shadow:0 14px 36px rgba(217,66,32,.45)}
.s-date{font-family:'VinSans';font-weight:700;font-size:38px;color:#fff;opacity:.9;text-transform:capitalize;line-height:1.1}
.s-list{display:flex;flex-direction:column;gap:22px;margin-top:30px}
.s-master{display:flex;align-items:center;background:rgba(20,36,41,.62);border:1px solid rgba(200,148,58,.22);border-radius:26px}
.s-ava{border-radius:50%;flex:none;object-fit:cover;border:4px solid var(--gold);background:#0E191D}
.s-init{border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Marvin';color:#fff;border:4px solid var(--gold);background:linear-gradient(135deg,var(--accent),#8f2a14)}
.s-info{flex:1;min-width:0}
.s-name{font-family:'Marvin';letter-spacing:1px;color:#fff;line-height:1}
.s-chips{display:flex;flex-wrap:wrap}
.s-chip{font-family:'VinSans';font-weight:800;color:#fff;background:rgba(217,66,32,.92);border-radius:13px;line-height:1.1}
.s-mid{flex:1;display:flex;align-items:center;justify-content:center;padding:30px 10px}
.s-quote{text-align:center;max-width:840px}
.s-quote .mark{font-family:'Marvin';color:var(--gold);line-height:.4;opacity:.55}
.s-quote .txt{font-family:'VinSans';font-style:italic;font-weight:400;line-height:1.32;color:#F3E8D8}
.s-foot{display:flex;align-items:center;gap:30px}
.s-qr{flex:none;background:#fff;border-radius:18px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.35);line-height:0}
.s-qr img{display:block;image-rendering:pixelated}
.s-cta{flex:1}
.s-cta .big{font-family:'Marvin';font-size:62px;color:var(--gold);line-height:.95}
.s-cta .small{font-family:'VinSans';font-weight:600;font-size:30px;color:#fff;opacity:.9;margin-top:10px;line-height:1.25}
.s-cta .phlbl{font-family:'VinSans';font-weight:600;font-size:28px;color:#fff;opacity:.8;margin-top:14px;line-height:1}
.s-cta .phone{font-family:'Marvin';font-weight:400;font-size:56px;color:#fff;margin-top:4px;letter-spacing:1px;line-height:1}
.s-foot.nocode .s-cta{text-align:center}
</style>
</head>
<body>
<h1>✂️ BRIXTON · Свободные окна</h1>
<div class="sub">Выбери день → проверь окна → «Скачать PNG» → выложи в статус</div>
<div class="toolbar">
  <button class="dbtn active" id="dayToday" onclick="setDay(0)">Сегодня</button>
  <button class="dbtn" id="dayTomorrow" onclick="setDay(1)">Завтра</button>
  <button class="dbtn" onclick="loadData()">🔄 Обновить данные</button>
  <input class="footinput" id="footText" value="Сделай скриншот и зажми QR-код, чтобы записаться" oninput="renderAll()" placeholder="Подсказка под кнопкой">
</div>
<div class="status" id="status">Загрузка…</div>
<div class="grid" id="grid"></div>

<script>
const SUPA_URL='https://ojzjwnxerbxnogahpfuz.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qemp3bnhlcmJ4bm9nYWhwZnV6Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTA3Mzc2MSwiZXhwIjoyMDk2NjQ5NzYxfQ.bQPZZCMZmc_S3yqq41DDpv1o8p2wO-8G6QN7VJ_BcBc';
const QUOTES=["Хорошая стрижка — это тихая уверенность.", "Стиль — это когда о тебе помнят раньше, чем ты заговорил.", "Мужчина начинается с деталей.", "Порядок в голове начинается с порядка на голове.", "Дисциплина — лучший стилист.", "Первое впечатление нельзя произвести дважды.", "Ухоженность — это уважение к себе и к другим.", "Внешний вид — визитка без слов.", "Настоящий класс не кричит — он аккуратно подстрижен.", "Будь острее своей бритвы.", "Уверенность надевается вместе со свежей стрижкой.", "Мелочи создают образ. Образ создаёт репутацию.", "Лучшая версия тебя начинается в кресле барбера.", "Стиль вне времени, мода — на сезон.", "Каждый день — повод выглядеть на все сто.", "Побеждает тот, кто следит за собой.", "Аккуратность — привычка сильных.", "Хочешь сменить настроение — начни с внешнего вида.", "Твой образ работает на тебя круглые сутки.", "Детали решают. Всегда.", "Свежая стрижка — как новый старт.", "Уважение начинается с зеркала.", "Форма держит содержание.", "Ухоженный мужчина не остаётся незамеченным.", "Инвестируй в себя — это всегда в плюс.", "Спокойствие, точность, стиль.", "Классика не выходит из моды.", "Сначала выглядишь — потом побеждаешь.", "Хороший барбер — половина успеха образа.", "Стрижка по расписанию — жизнь под контролем.", "Держи голову холодной, а стрижку — свежей.", "Меньше слов — больше стиля.", "Сила в деталях, характер в стиле.", "Твоё время — твой стиль. Не откладывай.", "Выглядеть хорошо — это привычка, а не случайность.", "Точность бритвы, чувство стиля, спокойствие духа."];
let FREE=null, DAY=0;
const masterOff={}, slotOff={}, quoteIdx={};
const urls={ '694866':'https://n741061.yclients.com', '1076318':'https://n741061.yclients.com' };
const phones={ '694866':'+7 917 747-25-25', '1076318':'+7 917 746-25-25' };

const MONTHS=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const WD=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
function ruDate(iso){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1,d);return WD[dt.getDay()]+', '+d+' '+MONTHS[m-1];}
function dayWord(i){return i===0?'СЕГОДНЯ':'ЗАВТРА';}
function proxyAva(raw){if(!raw)return null;return 'https://images.weserv.nl/?url=ssl:'+raw.replace(/^https?:\/\//,'')+'&w=300&h=300&fit=cover&mask=circle&output=png';}
function initials(n){const p=(n||'').trim().split(/\s+/);return ((p[0]||'').charAt(0)+(p[1]||'').charAt(0)).toUpperCase()||'?';}
function qrDataUrl(t){if(!t||typeof qrcode==='undefined')return null;try{const q=qrcode(0,'M');q.addData(t);q.make();return q.createDataURL(6);}catch(e){return null;}}
function rerollQuote(bid){quoteIdx[bid]=Math.floor(Math.random()*QUOTES.length);renderAll();}

async function loadData(){
  document.getElementById('status').textContent='Загрузка…';
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/brixton_store?id=eq.main&select=data',{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});
    const rows=await r.json();
    FREE=rows&&rows[0]&&rows[0].data?rows[0].data.freeSlots:null;
    if(!FREE){document.getElementById('status').textContent='В Supabase нет freeSlots — запусти buildFreeSlots.';return;}
    const gen=FREE.generatedAt?new Date(FREE.generatedAt).toLocaleString('ru-RU'):'—';
    document.getElementById('status').textContent='Обновлено: '+gen+'  •  даты: '+(FREE.dates||[]).join(', ');
    Object.keys(FREE.branches).forEach(bid=>{if(quoteIdx[bid]===undefined)quoteIdx[bid]=Math.floor(Math.random()*QUOTES.length);});
    var urlDay=new URLSearchParams(location.search).get('day');
    setDay(urlDay==='tomorrow'?1:0);
  }catch(e){document.getElementById('status').textContent='Ошибка загрузки: '+e.message;}
}
function setDay(d){DAY=d;document.getElementById('dayToday').classList.toggle('active',d===0);document.getElementById('dayTomorrow').classList.toggle('active',d===1);renderAll();}
function mastersFor(br,dk){return (br.masters||[]).filter(m=>m.slots&&m.slots[dk]&&m.slots[dk].length);}
function selTimes(bid,m,dk){return m.slots[dk].filter(t=>!slotOff[bid+'|'+m.id+'|'+t]);}

function renderAll(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  if(!FREE)return;
  const dk=FREE.dates[DAY];
  const foot=document.getElementById('footText').value;
  Object.keys(FREE.branches).forEach(bid=>{
    const br=FREE.branches[bid];
    const all=mastersFor(br,dk);
    const shown=all.filter(m=>!masterOff[bid+'|'+m.id]&&selTimes(bid,m,dk).length);
    const col=document.createElement('div');col.className='col';

    const box=document.createElement('div');box.className='previewBox';
    const scaler=document.createElement('div');scaler.className='scaler';
    const story=buildStory(bid,br.name,dk,shown,foot);story.id='story_'+bid;
    scaler.appendChild(story);box.appendChild(scaler);col.appendChild(box);

    const panel=document.createElement('div');panel.className='panel';
    panel.innerHTML='<div class="ttl">'+br.name+' — окна ('+all.length+' мастеров)</div>';
    if(!all.length){panel.innerHTML+='<div class="empty">Нет свободных окон на этот день</div>';}
    else{
      all.forEach(m=>{
        const mkey=bid+'|'+m.id;
        const mrow=document.createElement('div');mrow.className='mrow';
        const head=document.createElement('label');head.className='mhead';
        head.innerHTML='<input type="checkbox" '+(masterOff[mkey]?'':'checked')+'> '+m.name+'<span class="cnt">'+selTimes(bid,m,dk).length+'/'+m.slots[dk].length+'</span>';
        head.querySelector('input').addEventListener('change',ev=>{if(ev.target.checked)delete masterOff[mkey];else masterOff[mkey]=true;renderAll();});
        mrow.appendChild(head);
        const sl=document.createElement('div');sl.className='slots';
        m.slots[dk].forEach(t=>{
          const skey=mkey+'|'+t;const off=!!slotOff[skey];
          const b=document.createElement('span');b.className='slotbtn '+(off?'off':'on');b.textContent=t;
          b.onclick=()=>{if(slotOff[skey])delete slotOff[skey];else slotOff[skey]=true;renderAll();};
          sl.appendChild(b);
        });
        mrow.appendChild(sl);panel.appendChild(mrow);
      });
    }
    col.appendChild(panel);

    const ub=document.createElement('div');ub.className='urlbox';
    ub.innerHTML='<div><label>Ссылка на запись (QR) — '+br.name+'</label></div>';
    const inpU=document.createElement('input');inpU.value=urls[bid]||'';inpU.placeholder='https://...';
    inpU.oninput=()=>{urls[bid]=inpU.value.trim();renderAll();};
    const lblP=document.createElement('label');lblP.textContent='Телефон для записи';
    const inpP=document.createElement('input');inpP.value=phones[bid]||'';inpP.placeholder='+7 ...';
    inpP.oninput=()=>{phones[bid]=inpP.value.trim();renderAll();};
    ub.appendChild(inpU);ub.appendChild(lblP);ub.appendChild(inpP);col.appendChild(ub);

    const rb=document.createElement('div');rb.className='rowbtns';
    const q=document.createElement('button');q.className='qbtn';q.textContent='🎲 Цитата';q.onclick=()=>rerollQuote(bid);
    const dl=document.createElement('button');dl.className='dl';dl.textContent='⬇ Скачать PNG — '+br.name;dl.disabled=!shown.length;dl.onclick=()=>downloadStory(bid,br.name,dk);
    rb.appendChild(q);rb.appendChild(dl);col.appendChild(rb);

    grid.appendChild(col);
  });
}

function buildStory(bid,place,dk,masters,foot){
  const s=document.createElement('div');s.className='story';
  const n=masters.length;
  const k = n<=1?1.55 : n===2?1.28 : n===3?1.08 : n===4?0.94 : 0.82;
  const qk = n<=1?1.7 : n===2?1.35 : n===3?1.12 : n===4?0.95 : 0.82;
  const px=(v)=>Math.round(v*k)+'px';
  const listStyle='gap:'+px(22)+';margin-top:'+px(30);
  const masterStyle='gap:'+px(28)+';padding:'+px(24)+' '+px(30);
  const avaStyle='width:'+px(142)+';height:'+px(142);
  const initStyle=avaStyle+';font-size:'+px(58);
  const nameStyle='font-size:'+px(56)+';margin-bottom:'+px(14);
  const chipsStyle='gap:'+px(12);
  const chipStyle='font-size:'+px(33)+';padding:'+px(9)+' '+px(20);
  const markStyle='font-size:'+Math.round(120*qk)+'px';
  const txtStyle='font-size:'+Math.round(46*qk)+'px';
  const rows=masters.map(m=>{
    const chips=selTimes(bid,m,dk).map(t=>'<span class="s-chip" style="'+chipStyle+'">'+t+'</span>').join('');
    const av=proxyAva(m.avatar);
    const avaHtml=av?'<img class="s-ava" style="'+avaStyle+'" crossorigin="anonymous" src="'+av+'" onerror="this.outerHTML=\'<div class=&quot;s-init&quot; style=&quot;'+initStyle+'&quot;>'+initials(m.name)+'</div>\'">':'<div class="s-init" style="'+initStyle+'">'+initials(m.name)+'</div>';
    return '<div class="s-master" style="'+masterStyle+'">'+avaHtml+'<div class="s-info"><div class="s-name" style="'+nameStyle+'">'+m.name+'</div><div class="s-chips" style="'+chipsStyle+'">'+chips+'</div></div></div>';
  }).join('');
  const quote=QUOTES[quoteIdx[bid]!==undefined?quoteIdx[bid]:0];
  const ph=(phones[bid]||'').trim();
  const qr=qrDataUrl(urls[bid]);
  const phoneLine=ph?'<div class="phlbl">Или звони:</div><div class="phone">'+ph+'</div>':'';
  const footHtml=qr
    ?'<div class="s-foot"><div class="s-qr"><img src="'+qr+'"></div><div class="s-cta"><div class="big">ЗАПИШИСЬ</div><div class="small">'+foot+'</div>'+phoneLine+'</div></div>'
    :'<div class="s-foot nocode"><div class="s-cta"><div class="big">ЗАПИШИСЬ ОНЛАЙН</div>'+(ph?'<div class="phlbl">Звони:</div><div class="phone">'+ph+'</div>':'')+'</div></div>';
  s.innerHTML=
    '<div class="tex"></div><div class="vig"></div><div class="frame"></div>'+
    '<div class="s-topline"><div class="s-brand">BRIX<b>T</b>ON</div><div class="s-place">'+place+'</div></div>'+
    '<div class="s-title">СВОБОДНЫЕ <span>ОКНА</span></div>'+
    '<div class="s-daywrap"><div class="s-daybadge">'+dayWord(DAY)+'</div><div class="s-date">'+ruDate(dk)+'</div></div>'+
    '<div class="s-list" style="'+listStyle+'">'+rows+'</div>'+
    '<div class="s-mid"><div class="s-quote"><div class="mark" style="'+markStyle+'">&#8220;</div><div class="txt" style="'+txtStyle+'">'+quote+'</div></div></div>'+
    footHtml;
  return s;
}

async function downloadStory(bid,place,dk){
  await document.fonts.ready;
  const node=document.getElementById('story_'+bid);
  const holder=document.createElement('div');
  holder.style.cssText='position:fixed;left:-100000px;top:0;z-index:-1';
  const clone=node.cloneNode(true);
  holder.appendChild(clone);
  document.body.appendChild(holder);
  try{
    const canvas=await html2canvas(clone,{width:1080,height:1920,scale:1,useCORS:true,backgroundColor:null});
    const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='brixton_'+place+'_'+dk+'.png';a.click();
  } finally { document.body.removeChild(holder); }
}
loadData();
</script>
</body>
